name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore LocalCompanion.csproj

      - name: Build WinUI (Release x64)
        run: dotnet build LocalCompanion.csproj -c Release -p:Platform=x64 --no-restore

      - name: Test Core
        run: dotnet test tests/LocalCompanion.Core.Tests/LocalCompanion.Core.Tests.csproj -c Release --verbosity minimal
